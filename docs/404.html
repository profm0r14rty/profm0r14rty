<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — segfault</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" />
<style>
  :root{--bg:oklch(0.14 0.01 20);--fg:oklch(0.94 0.02 20);--primary:oklch(0.58 0.22 25);--muted:oklch(0.6 0.03 20);--glow:oklch(0.68 0.25 25);--blood:oklch(0.52 0.24 25);}
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:"JetBrains Mono",ui-monospace,monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:1rem;}
  .k{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--primary);}
  h1{font-size:5rem;margin:.75rem 0;text-shadow:0 0 8px color-mix(in oklab,var(--glow) 50%,transparent),0 0 24px color-mix(in oklab,var(--blood) 30%,transparent);}
  p{color:var(--muted);font-size:.875rem;}
  a{display:inline-block;margin-top:1.5rem;border:1px solid color-mix(in oklab,var(--primary) 60%,transparent);background:color-mix(in oklab,var(--primary) 10%,transparent);color:var(--primary);padding:.5rem 1rem;font-size:.875rem;text-decoration:none;}
  a:hover{background:color-mix(in oklab,var(--primary) 20%,transparent);}
</style>
</head>
<body>
<div>
  <p class="k">segfault</p>
  <h1>404</h1>
  <p>&gt; route not found in the stack.</p>
  <a href="./"><span style="color:var(--primary)">$</span> cd ~/</a>
</div>
</body>
</html>
